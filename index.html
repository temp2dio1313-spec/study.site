<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Palette - 明るくおしゃれな勉強記録</title>
    <style>
        :root {
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
            --text-main: #333d47;
            --text-sub: #7d8790;
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --accent: #00cec9;
            --border: #e4e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 共通カードスタイル */
        .container {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 900px;
            padding: 40px;
            transition: all 0.3s ease;
        }

        h2 {
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 15px;
            background: #fafafa;
            transition: border 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }

        /* ログイン画面 */
        #login-screen {
            max-width: 400px;
        }

        /* メイン画面レイアウト */
        #main-screen {
            display: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .user-welcome {
            font-size: 20px;
            font-weight: bold;
        }

        /* 上部：時計＆ミニカレンダー */
        .dashboard-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .dashboard-card {
            background: #fdfdfd;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 160px;
        }

        #live-clock {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        #live-date {
            font-size: 16px;
            color: var(--text-sub);
        }

        /* ミニカレンダー */
        .mini-cal {
            width: 100%;
            text-align: center;
        }
        .mini-cal-header {
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--text-main);
        }
        .mini-cal-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            font-size: 12px;
        }
        .mini-cal-day {
            padding: 5px;
            color: var(--text-sub);
        }
        .mini-cal-day.today {
            background: var(--primary-light);
            color: white;
            border-radius: 50%;
            font-weight: bold;
        }

        /* 下部：ナビゲーションボタン */
        .nav-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .nav-btn {
            background: #f0f3f8;
            color: var(--text-main);
            font-weight: 600;
            padding: 16px;
        }

        .nav-btn.active, .nav-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* コンテンツエリア */
        .content-section {
            display: none;
            border-top: 1px solid var(--border);
            padding-top: 30px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* タイマー機能 */
        .timer-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .timer-tab-btn {
            background: none;
            color: var(--text-sub);
            border: 1px solid var(--border);
        }
        .timer-tab-btn.active {
            background: var(--text-main);
            color: white;
        }
        .timer-display {
            font-size: 64px;
            font-weight: 700;
            text-align: center;
            margin: 20px 0;
            font-family: monospace;
            color: var(--text-main);
        }
        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        /* 勉強記録（カレンダー） */
        .record-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .calendar-cell {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            min-height: 80px;
            position: relative;
            background: #fff;
        }
        .calendar-cell .date-num {
            font-size: 12px;
            color: var(--text-sub);
        }
        .calendar-cell .study-time {
            font-size: 12px;
            color: var(--accent);
            font-weight: bold;
            margin-top: 8px;
            display: block;
        }
        .record-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        /* メモ */
        #memo-textarea {
            height: 200px;
            resize: none;
            line-height: 1.6;
        }

        /* チャット */
        .chat-room {
            display: flex;
            flex-direction: column;
            height: 400px;
        }
        .chat-messages {
            flex-grow: 1;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
            background: #fafbfc;
            margin-bottom: 15px;
        }
        .chat-bubble {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 16px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            border-left: 4px solid var(--primary-light);
            max-width: 85%;
        }
        .chat-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-sub);
            margin-bottom: 4px;
        }
        .chat-text {
            font-size: 14px;
            word-break: break-all;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
        }
        .chat-input-area input {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="container">
        <h2>Study Palette</h2>
        <div style="margin-bottom: 15px; text-align: center; color: var(--text-sub); font-size: 13px;">
            ログインして勉強をはじめましょう
        </div>
        <input type="text" id="username" placeholder="ユーザーID">
        <input type="password" id="password" placeholder="パスワード">
        <button onclick="login()" style="width: 100%;">ログイン</button>
        <p id="login-error" style="color: red; font-size: 13px; text-align: center; margin-top: 10px; display: none;">IDまたはパスワードが違います</p>
    </div>

    <div id="main-screen" class="container">
        <div class="header">
            <div class="user-welcome">Welcome, <span id="user-display-name">ユーザー</span> さん</div>
            <button onclick="logout()" style="background:none; color:var(--text-sub); padding:0; font-size:14px;">ログアウト</button>
        </div>

        <div class="dashboard-top">
            <div class="dashboard-card">
                <div id="live-clock">00:00:00</div>
                <div id="live-date">2026年06月21日(日)</div>
            </div>
            <div class="dashboard-card">
                <div class="mini-cal">
                    <div class="mini-cal-header" id="mini-month">2026年6月</div>
                    <div class="mini-cal-days" id="mini-days">
                        </div>
                </div>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" onclick="switchSection('timer')">勉強タイマー</button>
            <button class="nav-btn" onclick="switchSection('record')">勉強記録</button>
            <button class="nav-btn" onclick="switchSection('memo')">メモ</button>
            <button class="nav-btn" onclick="switchSection('chat')">チャット</button>
        </div>

        <div id="section-timer" class="content-section">
            <div class="timer-tabs">
                <button class="timer-tab-btn active" onclick="setTimerMode('clock')">知的時計</button>
                <button class="timer-tab-btn" onclick="setTimerMode('pomodoro')">ポモドーロ</button>
                <button class="timer-tab-btn" onclick="setTimerMode('timer')">タイマー(15分)</button>
            </div>
            <div class="timer-display" id="timer-display">00:00</div>
            <div class="timer-controls">
                <button id="timer-start-btn" onclick="toggleTimer()">スタート</button>
                <button onclick="resetTimer()">リセット</button>
            </div>
        </div>

        <div id="section-record" class="content-section">
            <div class="record-input-group">
                <input type="number" id="study-hours" placeholder="今日の勉強時間 (分)" min="0">
                <button onclick="saveStudyRecord()">記録する</button>
            </div>
            <div class="record-calendar" id="record-calendar">
                </div>
        </div>

        <div id="section-memo" class="content-section">
            <textarea id="memo-textarea" placeholder="ここに自由にメモを残せます。自動保存されます..." oninput="saveMemo()"></textarea>
            <p style="font-size: 12px; color: var(--text-sub); text-align: right;">※このメモはあなただけに同期されています</p>
        </div>

        <div id="section-chat" class="content-section">
            <div class="chat-room">
                <div class="chat-messages" id="chat-messages">
                    </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="メッセージを入力..." onkeypress="if(event.key==='Enter') sendChat()">
                    <button onclick="sendChat()">送信</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ユーザーデータ
        const users = {
            "takuma": { pass: "1111", name: "柿原 拓真" },
            "yuzuki": { pass: "0925", name: "新里 結月" }
        };

        let currentUser = null;

        // ログイン処理
        function login() {
            const id = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            
            if (users[id] && users[id].pass === pass) {
                currentUser = users[id];
                currentUser.id = id;
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-screen").style.display = "block";
                document.getElementById("user-display-name").textContent = currentUser.name;
                
                // 初期化処理
                initDashboard();
                loadMemo();
                switchSection('timer'); // 初期セクション
                document.getElementById("login-error").style.display = "none";
            } else {
                document.getElementById("login-error").style.display = "block";
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById("login-screen").style.display = "block";
            document.getElementById("main-screen").style.display = "none";
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
        }

        // ダッシュボード（時計・ミニカレンダー）の同期
        function initDashboard() {
            // リアルタイム時計
            setInterval(() => {
                const now = new Date();
                document.getElementById("live-clock").textContent = now.toTimeString().split(' ')[0];
                const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
                document.getElementById("live-date").textContent = now.toLocaleDateString('ja-JP', options);
                if(timerMode === 'clock') {
                    document.getElementById("timer-display").textContent = now.toTimeString().split(' ')[0].substring(0,5);
                }
            }, 1000);

            // ミニカレンダー（直近1週間をシンプルに表示）
            const miniDays = document.getElementById("mini-days");
            miniDays.innerHTML = "";
            const now = new Date();
            for(let i = -3; i <= 3; i++) {
                const d = new Date();
                d.setDate(now.getDate() + i);
                const isToday = i === 0 ? "today" : "";
                miniDays.innerHTML += `<div class="mini-cal-day ${isToday}">${d.getDate()}</div>`;
            }
            document.getElementById("mini-month").textContent = `${now.getFullYear()}年 ${now.getMonth()+1}月`;
            
            // 記録カレンダーの生成
            renderRecordCalendar();
        }

        // セクション切り替え
        function switchSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(`section-${sectionId}`).style.display = 'block';
            event.target.classList.add('active');

            if(sectionId === 'chat') {
                loadChat();
            }
        }

        // タイマー機能のロジック
        let timerMode = 'clock'; 
        let timerInterval = null;
        let timerSeconds = 0;
        let isRunning = false;

        function setTimerMode(mode) {
            timerMode = mode;
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById("timer-start-btn").textContent = "スタート";
            document.querySelectorAll('.timer-tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (mode === 'clock') {
                const now = new Date();
                document.getElementById("timer-display").textContent = now.toTimeString().split(' ')[0].substring(0,5);
            } else if (mode === 'pomodoro') {
                timerSeconds = 25 * 60;
                updateTimerDisplay();
            } else if (mode === 'timer') {
                timerSeconds = 15 * 60;
                updateTimerDisplay();
            }
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
            const s = (timerSeconds % 60).toString().padStart(2, '0');
            document.getElementById("timer-display").textContent = `${m}:${s}`;
        }

        function toggleTimer() {
            if(timerMode === 'clock') return;
            if (isRunning) {
                clearInterval(timerInterval);
                document.getElementById("timer-start-btn").textContent = "スタート";
            } else {
                timerInterval = setInterval(() => {
                    if(timerSeconds > 0) {
                        timerSeconds--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timerInterval);
                        alert("時間になりました！お疲れ様です。");
                    }
                }, 1000);
                document.getElementById("timer-start-btn").textContent = "一時停止";
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById("timer-start-btn").textContent = "スタート";
            if(timerMode === 'pomodoro') timerSeconds = 25 * 60;
            if(timerMode === 'timer') timerSeconds = 15 * 60;
            updateTimerDisplay();
        }

        // 勉強記録ロジック
        function renderRecordCalendar() {
            const container = document.getElementById("record-calendar");
            container.innerHTML = "";
            const records = JSON.parse(localStorage.getItem(`study_records_${currentUser.id}`) || "{}");
            
            // 簡易的に今月の1日から14日分ほどの綺麗なおしゃれグリッドを表示
            for(let i = 1; i <= 14; i++) {
                const time = records[i] ? `${records[i]}分` : "-";
                container.innerHTML += `
                    <div class="calendar-cell">
                        <span class="date-num">6/${i}</span>
                        <span class="study-time">${time}</span>
                    </div>
                `;
            }
        }

        function saveStudyRecord() {
            const mins = document.getElementById("study-hours").value;
            if(!mins) return;
            const records = JSON.parse(localStorage.getItem(`study_records_${currentUser.id}`) || "{}");
            // デモとして一律「今日の枠（例：6日）」に保存
            const todayDate = new Date().getDate();
            records[todayDate] = mins;
            localStorage.setItem(`study_records_${currentUser.id}`, JSON.stringify(records));
            renderRecordCalendar();
            document.getElementById("study-hours").value = "";
        }

        // メモロジック (ユーザーごとに分離)
        function loadMemo() {
            const savedMemo = localStorage.getItem(`memo_${currentUser.id}`) || "";
            document.getElementById("memo-textarea").value = savedMemo;
        }

        function saveMemo() {
            const text = document.getElementById("memo-textarea").value;
            localStorage.setItem(`memo_${currentUser.id}`, text);
        }

        // チャットロジック (全員で共有)
        function loadChat() {
            const chatMessages = document.getElementById("chat-messages");
            chatMessages.innerHTML = "";
            const logs = JSON.parse(localStorage.getItem("global_chat_logs") || "[]");
            
            logs.forEach(log => {
                // 既読数は簡易的に「自分以外のユーザーがいれば1、いなければ0」をシミュレート
                const readCount = 1; 
                chatMessages.innerHTML += `
                    <div class="chat-bubble">
                        <div class="chat-meta">
                            <strong>${log.name}</strong>
                            <span>${log.time} · 既読 ${readCount}</span>
                        </div>
                        <div class="chat-text">${log.text}</div>
                    </div>
                `;
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendChat() {
            const input = document.getElementById("chat-input");
            if(!input.value.trim()) return;

            const logs = JSON.parse(localStorage.getItem("global_chat_logs") || "[]");
            const now = new Date();
            const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
            
            logs.push({
                name: currentUser.name,
                text: input.value,
                time: timeStr
            });

            localStorage.setItem("global_chat_logs", JSON.stringify(logs));
            input.value = "";
            loadChat();
        }
    </script>
</body>
</html>
