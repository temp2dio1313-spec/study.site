<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Palette 💕 ふんわりかわいい勉強記録</title>
    <style>
        :root {
            --bg-color: #ffeef6;
            --card-bg: #ffffff;
            --text-main: #634e56;
            --text-sub: #a8949c;
            --primary: #ff94c9;
            --primary-light: #ffb7dd;
            --primary-dark: #e06fa7;
            --accent: #7be1df;
            --border: #fce2f0;
            --chat-bg: #abc1d1; /* LINE風背景 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cookie', 'M PLUS Rounded 1c', 'Hiragino Maru Gothic ProN', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(#fff0f5 20%, transparent 20%), radial-gradient(#fff0f5 20%, transparent 20%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        /* 共通カードスタイル */
        .container {
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 12px 28px rgba(255, 148, 201, 0.15);
            width: 100%;
            max-width: 900px;
            padding: 35px;
            transition: all 0.3s ease;
            border: 3px solid #fff;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            color: var(--primary-dark);
            text-shadow: 1px 1px 0px #fff;
        }

        button {
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 148, 201, 0.3);
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(255, 148, 201, 0.4);
        }
        
        button:active {
            transform: translateY(1px);
        }

        input, textarea {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid var(--border);
            border-radius: 20px;
            margin-bottom: 16px;
            font-size: 15px;
            background: #fffcfd;
            color: var(--text-main);
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            background: #fff;
        }

        /* ログイン画面 */
        #login-screen {
            max-width: 400px;
            text-align: center;
        }

        /* メイン画面レイアウト */
        #main-screen {
            display: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed var(--border);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .user-welcome {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-dark);
        }

        /* 上部：時計＆ミニカレンダー */
        .dashboard-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .dashboard-card {
            background: #fff9fc;
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150px;
            cursor: pointer;
            position: relative;
        }
        
        .dashboard-card:hover {
            background: #fff5fa;
        }

        #live-clock {
            font-size: 36px;
            font-weight: bold;
            color: var(--primary-dark);
            letter-spacing: 1px;
        }

        #live-date {
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 5px;
        }

        /* ミニカレンダー */
        .mini-cal {
            width: 100%;
            text-align: center;
        }
        .mini-cal-header {
            font-weight: bold;
            margin-bottom: 12px;
            color: var(--text-main);
            font-size: 15px;
        }
        .mini-cal-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .mini-cal-day {
            padding: 6px;
            font-size: 13px;
            color: var(--text-sub);
        }
        .mini-cal-day.today {
            background: var(--primary);
            color: white;
            border-radius: 50%;
            font-weight: bold;
            box-shadow: 0 3px 6px rgba(255,148,201,0.4);
        }
        
        .click-hint {
            position: absolute;
            bottom: 5px;
            font-size: 10px;
            color: var(--text-sub);
        }

        /* 下部：ナビゲーションボタン */
        .nav-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .nav-btn {
            background: #fff0f6;
            color: var(--text-main);
            border: 2px solid var(--border);
            box-shadow: none;
            border-radius: 18px;
            padding: 14px;
            font-size: 15px;
        }

        .nav-btn.active, .nav-btn:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 10px rgba(255, 148, 201, 0.3);
        }

        /* コンテンツエリア */
        .content-section {
            display: none;
            border-top: 2px dashed var(--border);
            padding-top: 25px;
            animation: fadeIn 0.4s ease-transform;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* タイマー選択画面 */
        .timer-menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .timer-menu-btn {
            padding: 25px;
            font-size: 18px;
            border-radius: 20px;
            background: #fffdfd;
            color: var(--text-main);
            border: 2px solid var(--border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .timer-menu-btn:hover {
            background: var(--primary-light);
            color: white;
        }

        /* 全画面表示用オーバーレイ */
        .fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .fullscreen-title {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary-dark);
            margin-bottom: 20px;
        }
        .fullscreen-display {
            font-size: 96px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 4px;
            font-family: monospace;
            text-shadow: 2px 2px 0px #fff;
        }
        .fullscreen-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .back-menu-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #fff;
            color: var(--text-main);
            border: 2px solid var(--border);
        }
        .timer-setting-input {
            width: 120px;
            text-align: center;
            font-size: 24px;
            margin-bottom: 0;
            display: inline-block;
        }

        /* 大きなカレンダーモーダル */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(99, 78, 86, 0.4);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 650px;
            border: 4px solid var(--primary-light);
        }
        .big-calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .big-cal-cell {
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 10px;
            min-height: 75px;
            background: #fffcfd;
            text-align: left;
        }
        .big-cal-cell.has-data {
            background: #fff0f6;
            border-color: var(--primary-light);
        }
        .big-cal-cell .date-num {
            font-size: 13px;
            font-weight: bold;
            color: var(--text-sub);
        }
        .big-cal-cell .study-time {
            font-size: 12px;
            color: var(--primary-dark);
            font-weight: bold;
            margin-top: 8px;
            display: block;
        }

        /* 勉強記録（手動入力エリア） */
        .record-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        /* メモ */
        #memo-textarea {
            height: 250px;
            resize: none;
            line-height: 1.8;
            border-radius: 24px;
            background: #fffdfd;
        }

        /* 💕 LINE風チャットルーム 💕 */
        .chat-room {
            display: flex;
            flex-direction: column;
            height: 450px;
            background: var(--chat-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid var(--border);
        }
        .chat-header-bar {
            background: rgba(0, 0, 0, 0.05);
            padding: 10px 20px;
            font-weight: bold;
            font-size: 14px;
            color: #fff;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
        }
        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        /* LINE吹き出しベース */
        .msg-row {
            display: flex;
            width: 100%;
            align-items: flex-end;
        }
        
        /* 相手の発言 (左側) */
        .msg-row.left {
            justify-content: flex-start;
        }
        /* 自分の発言 (右側) */
        .msg-row.right {
            justify-content: flex-end;
        }
        
        .msg-content-wrapper {
            display: flex;
            flex-direction: column;
        }
        .msg-row.left .msg-content-wrapper {
            align-items: flex-start;
        }
        .msg-row.right .msg-content-wrapper {
            align-items: flex-end;
        }

        .msg-user-name {
            font-size: 11px;
            color: #fff;
            margin-bottom: 3px;
            margin-left: 5px;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
        }
        
        .bubble-container {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }
        
        .chat-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            max-width: 280px;
            word-break: break-all;
            position: relative;
            line-height: 1.4;
        }
        
        /* 左側：白の吹き出し */
        .msg-row.left .chat-bubble {
            background: #ffffff;
            color: #000000;
            border-top-left-radius: 4px;
        }
        /* 右側：緑の吹き出し */
        .msg-row.right .chat-bubble {
            background: #85e249;
            color: #000000;
            border-top-right-radius: 4px;
        }
        
        .msg-meta {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
            line-height: 1.2;
        }
        .msg-row.right .msg-meta {
            text-align: right;
        }
        .read-status {
            color: #efff42;
            font-weight: bold;
        }

        .chat-input-area {
            display: flex;
            padding: 12px;
            background: #ffffff;
            gap: 10px;
            align-items: center;
        }
        .chat-input-area input {
            margin-bottom: 0;
            border-radius: 20px;
            background: #f3f3f3;
            border: none;
            padding: 10px 15px;
        }
        .chat-input-area button {
            padding: 10px 20px;
            border-radius: 18px;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="container">
        <h2>🌸 Study Palette 🌸</h2>
        <div style="margin-bottom: 20px; color: var(--text-sub); font-size: 14px;">
            ひみつのIDとパスワードを入力してね💕
        </div>
        <input type="text" id="username" placeholder="ユーザーID">
        <input type="password" id="password" placeholder="パスワード">
        <button onclick="login()" style="width: 100%;">ログインする 💖</button>
        <p id="login-error" style="color: #ff4a8d; font-size: 13px; text-align: center; margin-top: 12px; display: none; font-weight: bold;">まちがえちゃったみたい、もういちど入力してね！</p>
    </div>

    <div id="main-screen" class="container">
        <div class="header">
            <div class="user-welcome">💖 <span id="user-display-name">ユーザー</span> のお部屋 💖</div>
            <button onclick="logout()" style="background:none; color:var(--text-sub); padding:0; font-size:13px; box-shadow:none;">ログアウト</button>
        </div>

        <div class="dashboard-top">
            <div class="dashboard-card" onclick="switchSection('timer')">
                <div id="live-clock">00:00:00</div>
                <div id="live-date">2026年06月21日(日)</div>
            </div>
            <div class="dashboard-card" onclick="openBigCalendar()">
                <div class="mini-cal">
                    <div class="mini-cal-header" id="mini-month">2026年6月</div>
                    <div class="mini-cal-days" id="mini-days"></div>
                </div>
                <div class="click-hint">✨ タップで大きくひらくよ ✨</div>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" onclick="switchSection('timer')">勉強タイマー</button>
            <button class="nav-btn" onclick="switchSection('record')">勉強記録</button>
            <button class="nav-btn" onclick="switchSection('memo')">メモ</button>
            <button class="nav-btn" onclick="switchSection('chat')">チャット</button>
        </div>

        <div id="section-timer" class="content-section">
            <div class="timer-menu-grid">
                <button class="timer-menu-btn" onclick="openFullscreenTimer('clock')">⏰ 時計</button>
                <button class="timer-menu-btn" onclick="openFullscreenTimer('pomodoro')">🍅 ポモドーロタイマー</button>
                <button class="timer-menu-btn" onclick="openFullscreenTimer('custom')">✏️ タイマー</button>
                <button class="timer-menu-btn" onclick="openFullscreenTimer('stopwatch')">⏱️ ストップウォッチ</button>
            </div>
        </div>

        <div id="section-record" class="content-section">
            <div class="record-input-group">
                <input type="number" id="study-hours" placeholder="手動で記録：勉強時間 (分)" min="0">
                <button onclick="saveManualRecord()">記録する ✨</button>
            </div>
            <button onclick="openBigCalendar()" style="width:100%; background:var(--accent); margin-bottom:15px; box-shadow:none;">📅 大きいカレンダーを表示する</button>
        </div>

        <div id="section-memo" class="content-section">
            <textarea id="memo-textarea" placeholder="ここに秘密のメモを残せるよ。自動で保存されるから安心メッセージ..." oninput="saveMemo()"></textarea>
            <p style="font-size: 12px; color: var(--text-sub); text-align: right;">※このメモはあなたにだけ見えています 🔒</p>
        </div>

        <div id="section-chat" class="content-section">
            <div class="chat-room">
                <div class="chat-header-bar">勉強なかまのトークルーム 💬</div>
                <div class="chat-messages" id="chat-messages">
                    </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="メッセージを入力..." onkeypress="if(event.key==='Enter') sendChat()">
                    <button onclick="sendChat()">送信</button>
                </div>
            </div>
        </div>
    </div>

    <div id="timer-overlay" class="fullscreen-overlay">
        <button class="back-menu-btn" onclick="closeFullscreenTimer()">🌸 もどる</button>
        <div class="fullscreen-title" id="overlay-title">タイマー</div>
        
        <div id="custom-setup-area" style="margin-bottom: 20px; display: none;">
            <input type="number" id="custom-minutes" class="timer-setting-input" value="15" min="1"> <span style="font-size:20px; font-weight:bold;">分</span>
            <button onclick="applyCustomTimer()">セットする ✨</button>
        </div>

        <div class="fullscreen-display" id="overlay-display">00:00</div>
        
        <div id="pomo-status" style="font-size:18px; font-weight:bold; color:var(--text-sub); margin-bottom:15px; display:none;">しゅうちゅうタイム！📝</div>

        <div class="fullscreen-controls" id="overlay-controls">
            <button id="overlay-start-btn" onclick="toggleTimer()">スタート 🚀</button>
            <button onclick="resetTimer()">リセット 🔄</button>
            <button id="overlay-log-btn" onclick="logTimerTime()" style="background:var(--accent); display:none;">この時間を記録 📝</button>
        </div>
    </div>

    <div id="calendar-modal" class="modal" onclick="closeBigCalendar()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="big-calendar-month-title">2026年 6月のでんきょきろく</h2>
            <div class="big-calendar-grid" id="big-calendar-grid">
                </div>
            <button onclick="closeBigCalendar()" style="margin-top: 20px; width: 100%; background: var(--text-sub);">とじる 🎀</button>
        </div>
    </div>

    <script>
        // ユーザーデータ
        const users = {
            "takuma": { pass: "1111", name: "柿原 拓真" },
            "yuzuki": { pass: "0925", name: "新里 結月" }
        };

        let currentUser = null;

        // ログイン処理
        function login() {
            const id = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            
            if (users[id] && users[id].pass === pass) {
                currentUser = users[id];
                currentUser.id = id;
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-screen").style.display = "block";
                document.getElementById("user-display-name").textContent = currentUser.name;
                
                initDashboard();
                loadMemo();
                switchSection('timer');
                document.getElementById("login-error").style.display = "none";
            } else {
                document.getElementById("login-error").style.display = "block";
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById("login-screen").style.display = "block";
            document.getElementById("main-screen").style.display = "none";
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
        }

        // ダッシュボード初期化
        function initDashboard() {
            // リアルタイム時計更新
            setInterval(() => {
                const now = new Date();
                document.getElementById("live-clock").textContent = now.toTimeString().split(' ')[0];
                const options = { month: 'long', day: 'numeric', weekday: 'short' };
                document.getElementById("live-date").textContent = now.toLocaleDateString('ja-JP', options);
                
                // 全画面「時計」モードの時は常時更新
                if(currentOverlayMode === 'clock') {
                    document.getElementById("overlay-display").textContent = now.toTimeString().split(' ')[0];
                }
            }, 1000);

            // ミニカレンダー
            const miniDays = document.getElementById("mini-days");
            miniDays.innerHTML = "";
            const now = new Date();
            for(let i = -3; i <= 3; i++) {
                const d = new Date();
                d.setDate(now.getDate() + i);
                const isToday = i === 0 ? "today" : "";
                miniDays.innerHTML += `<div class="mini-cal-day ${isToday}">${d.getDate()}</div>`;
            }
            document.getElementById("mini-month").textContent = `${now.getFullYear()}年 ${now.getMonth()+1}月`;
        }

        // セクション切り替え
        function switchSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(`section-${sectionId}`).style.display = 'block';
            
            // ナビゲーションボタンをアクティブにする
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => {
                if(btn.textContent.includes(sectionId === 'timer' ? 'タイマー' : sectionId === 'record' ? '記録' : sectionId === 'memo' ? 'メモ' : 'チャット')) {
                    btn.classList.add('active');
                }
            });

            if(sectionId === 'chat') loadChat();
        }

        // ⏱️ タイマー全画面ロジック
        let currentOverlayMode = '';
        let timerInterval = null;
        let timerSeconds = 0;
        let elapsedSeconds = 0; // 記録用に経過/計測時間を数える
        let isRunning = false;
        let isPomoBreak = false;

        function openFullscreenTimer(mode) {
            currentOverlayMode = mode;
            const overlay = document.getElementById("timer-overlay");
            const title = document.getElementById("overlay-title");
            const display = document.getElementById("overlay-display");
            const controls = document.getElementById("overlay-controls");
            const setupArea = document.getElementById("custom-setup-area");
            const pomoStatus = document.getElementById("pomo-status");
            const logBtn = document.getElementById("overlay-log-btn");

            overlay.style.display = "flex";
            setupArea.style.display = "none";
            pomoStatus.style.display = "none";
            logBtn.style.display = "none";
            controls.style.display = "flex";
            
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById("overlay-start-btn").textContent = "スタート 🚀";

            if (mode === 'clock') {
                title.textContent = "🌸 時計 🌸";
                controls.style.display = "none";
                const now = new Date();
                display.textContent = now.toTimeString().split(' ')[0];
            } else if (mode === 'pomodoro') {
                title.textContent = "🍅 ポモドーロタイマー";
                pomoStatus.style.display = "block";
                pomoStatus.textContent = "しゅうちゅうタイム！📝 (25分)";
                timerSeconds = 25 * 60;
                elapsedSeconds = 0;
                logBtn.style.display = "block";
                updateOverlayDisplay();
            } else if (mode === 'custom') {
                title.textContent = "✏️ じぶんタイマー";
                setupArea.style.display = "block";
                timerSeconds = 15 * 60;
                elapsedSeconds = 0;
                logBtn.style.display = "block";
                updateOverlayDisplay();
            } else if (mode === 'stopwatch') {
                title.textContent = "⏱️ ストップウォッチ";
                timerSeconds = 0; // ストップウォッチは加算していく
                elapsedSeconds = 0;
                logBtn.style.display = "block";
                display.textContent = "00:00.0";
            }
        }

        function applyCustomTimer() {
            const mins = document.getElementById("custom-minutes").value;
            if (mins > 0) {
                timerSeconds = mins * 60;
                elapsedSeconds = 0;
                updateOverlayDisplay();
            }
        }

        function closeFullscreenTimer() {
            clearInterval(timerInterval);
            document.getElementById("timer-overlay").style.display = "none";
            currentOverlayMode = '';
        }

        function updateOverlayDisplay() {
            const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
            const s = (timerSeconds % 60).toString().padStart(2, '0');
            document.getElementById("overlay-display").textContent = `${m}:${s}`;
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                document.getElementById("overlay-start-btn").textContent = "スタート 🚀";
            } else {
                document.getElementById("overlay-start-btn").textContent = "一時停止 ⏸️";
                timerInterval = setInterval(() => {
                    if (currentOverlayMode === 'stopwatch') {
                        timerSeconds++;
                        elapsedSeconds = Math.floor(timerSeconds / 10);
                        // ストップウォッチ用表示法（コンマ秒表示）
                        const totalSec = Math.floor(timerSeconds / 10);
                        const m = Math.floor(totalSec / 60).toString().padStart(2, '0');
                        const s = (totalSec % 60).toString().padStart(2, '0');
                        const ms = (timerSeconds % 10);
                        document.getElementById("overlay-display").textContent = `${m}:${s}.${ms}`;
                    } else {
                        // カウントダウン式（ポモドーロ・カスタム）
                        if (timerSeconds > 0) {
                            timerSeconds--;
                            elapsedSeconds++;
                            updateOverlayDisplay();
                        } else {
                            clearInterval(timerInterval);
                            isRunning = false;
                            
                            if (currentOverlayMode === 'pomodoro') {
                                if (!isPomoBreak) {
                                    alert("よくがんばったね！5分間の休憩に入ります ☕");
                                    isPomoBreak = true;
                                    document.getElementById("pomo-status").textContent = "ごほうび休憩タイム ☕ (5分)";
                                    timerSeconds = 5 * 60;
                                    toggleTimer();
                                } else {
                                    alert("休憩おしまい！また集中しよう 📝");
                                    isPomoBreak = false;
                                    document.getElementById("pomo-status").textContent = "しゅうちゅうタイム！📝 (25分)";
                                    timerSeconds = 25 * 60;
                                    updateOverlayDisplay();
                                }
                            } else {
                                alert("時間になりました！お疲れ様です 💕");
                            }
                        }
                    }
                }, currentOverlayMode === 'stopwatch' ? 100 : 1000);
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById("overlay-start-btn").textContent = "スタート 🚀";
            
            if (currentOverlayMode === 'pomodoro') {
                isPomoBreak = false;
                document.getElementById("pomo-status").textContent = "しゅうちゅうタイム！📝 (25分)";
                timerSeconds = 25 * 60;
                elapsedSeconds = 0;
                updateOverlayDisplay();
            } else if (currentOverlayMode === 'custom') {
                applyCustomTimer();
            } else if (currentOverlayMode === 'stopwatch') {
                timerSeconds = 0;
                elapsedSeconds = 0;
                document.getElementById("overlay-display").textContent = "00:00.0";
            }
        }

        // ⏱️ タイマー計測時間をカレンダーに記録
        function logTimerTime() {
            // 秒を分換算（最低1分として記録）
            const minutesToLog = Math.max(1, Math.floor(elapsedSeconds / 60));
            addStudyTimeToRecords(minutesToLog);
            alert(`えらいっ！ 今の勉強時間 [ ${minutesToLog}分 ] をカレンダーに記録したよ 💖`);
            resetTimer();
        }


        // 📅 大きいカレンダー機能
        function openBigCalendar() {
            document.getElementById("calendar-modal").style.display = "flex";
            renderBigCalendar();
        }

        function closeBigCalendar() {
            document.getElementById("calendar-modal").style.display = "none";
        }

        function renderBigCalendar() {
            const grid = document.getElementById("big-calendar-grid");
            grid.innerHTML = "";
            const records = JSON.parse(localStorage.getItem(`study_records_${currentUser.id}`) || "{}");
            
            const now = new Date();
            document.getElementById("big-calendar-month-title").textContent = `🌸 ${now.getFullYear()}年 ${now.getMonth()+1}月のでんきょきろく 🌸`;

            // 今月の簡易30日分カレンダーを生成
            for (let i = 1; i <= 30; i++) {
                const time = records[i] ? `${records[i]}分` : "";
                const hasDataClass = records[i] ? "has-data" : "";
                grid.innerHTML += `
                    <div class="big-cal-cell ${hasDataClass}">
                        <span class="date-num">${i}日</span>
                        <span class="study-time">${time}</span>
                    </div>
                `;
            }
        }

        // 勉強時間の記録共通ロジック
        function addStudyTimeToRecords(mins) {
            const records = JSON.parse(localStorage.getItem(`study_records_${currentUser.id}`) || "{}");
            const todayDate = new Date().getDate();
            const currentRecord = records[todayDate] ? parseInt(records[todayDate]) : 0;
            
            // 今日の分に上乗せして保存
            records[todayDate] = currentRecord + parseInt(mins);
            localStorage.setItem(`study_records_${currentUser.id}`, JSON.stringify(records));
        }

        function saveManualRecord() {
            const mins = document.getElementById("study-hours").value;
            if (!mins || mins <= 0) return;
            addStudyTimeToRecords(mins);
            alert(`カレンダーに ${mins}分 記録したよ！💮`);
            document.getElementById("study-hours").value = "";
        }


        // 🔒 メモ機能
        function loadMemo() {
            const savedMemo = localStorage.getItem(`memo_${currentUser.id}`) || "";
            document.getElementById("memo-textarea").value = savedMemo;
        }

        function saveMemo() {
            const text = document.getElementById("memo-textarea").value;
            localStorage.setItem(`memo_${currentUser.id}`, text);
        }


        // 💬 LINE風チャット機能
        function loadChat() {
            const chatMessages = document.getElementById("chat-messages");
            chatMessages.innerHTML = "";
            const logs = JSON.parse(localStorage.getItem("global_chat_logs") || "[]");
            
            logs.forEach(log => {
                // 自分が送信したかどうかで左右のクラスを分ける
                const isMe = log.userId === currentUser.id;
                const sideClass = isMe ? "right" : "left";
                
                // LINE風レイアウトの生成
                let messageHtml = `
                    <div class="msg-row ${sideClass}">
                        <div class="msg-content-wrapper">
                `;
                
                // 相手の発言なら上に名前を表示
                if(!isMe) {
                    messageHtml += `<div class="msg-user-name">${log.name}</div>`;
                }
                
                messageHtml += `
                            <div class="bubble-container">
                `;

                // 自分の発言なら左側に既読と日時を表示
                if(isMe) {
                    messageHtml += `
                        <div class="msg-meta">
                            <span class="read-status">既読</span>
                            <span>${log.time}</span>
                        </div>
                    `;
                }

                messageHtml += `
                                <div class="chat-bubble">${log.text}</div>
                `;

                // 相手の発言なら右側に日時を表示
                if(!isMe) {
                    messageHtml += `
                        <div class="msg-meta">
                            <span style="margin-top:auto;">${log.time}</span>
                        </div>
                    `;
                }

                messageHtml += `
                            </div>
                        </div>
                    </div>
                `;
                
                chatMessages.innerHTML += messageHtml;
            });
            // 最下部まで自動スクロール
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendChat() {
            const input = document.getElementById("chat-input");
            if (!input.value.trim()) return;

            const logs = JSON.parse(localStorage.getItem("global_chat_logs") || "[]");
            const now = new Date();
            const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            
            logs.push({
                userId: currentUser.id,
                name: currentUser.name,
                text: input.value,
                time: timeStr
            });

            localStorage.setItem("global_chat_logs", JSON.stringify(logs));
            input.value = "";
            loadChat();
        }
    </script>
</body>
</html>
