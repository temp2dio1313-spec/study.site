<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Palette - パステルかわいい勉強記録</title>
    <style>
        :root {
            --bg-color: #ffeef6;
            --card-bg: #ffffff;
            --text-main: #634e56;
            --text-sub: #a8949c;
            --primary: #ff94c9;
            --primary-light: #ffb7dd;
            --primary-dark: #e06fa7;
            --accent: #7be1df;
            --border: #fce2f0;
            --chat-bg: #fff0f5; 
            --pencil-line: #d2b48c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Maru Gothic ProN', sans-serif;
            -webkit-tap-highlight-color: transparent; /* スマホのタップ時青背景を消す */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            background-image: radial-gradient(#fff0f5 20%, transparent 20%), radial-gradient(#fff0f5 20%, transparent 20%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        .container {
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 12px 28px rgba(255, 148, 201, 0.15);
            width: 100%;
            max-width: 900px;
            padding: 30px 20px;
            border: 3px solid #fff;
        }

        h2 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            color: var(--primary-dark);
        }

        h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--text-main);
            border-bottom: 2px dashed var(--border);
            padding-bottom: 5px;
        }

        button {
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 148, 201, 0.3);
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(255, 148, 201, 0.4);
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid var(--border);
            border-radius: 20px;
            margin-bottom: 16px;
            font-size: 15px;
            background: #fffcfd;
            color: var(--text-main);
            outline: none;
        }

        #login-screen { max-width: 400px; text-align: center; }
        #main-screen, #admin-screen { display: none; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .user-welcome { font-size: 16px; font-weight: bold; color: var(--primary-dark); }

        /* PC等での基本は2列並び */
        .dashboard-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .dashboard-card {
            background: #fff9fc;
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 130px;
        }
        .clickable-card { cursor: pointer; transition: background 0.2s; }
        .clickable-card:hover { background: #fff0f6; }

        #live-clock { font-size: 32px; font-weight: bold; color: var(--primary-dark); }
        #live-date { font-size: 13px; color: var(--text-sub); margin-top: 5px; }

        /* ナビゲーションの初期値 */
        .nav-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .nav-btn {
            background: #fff0f6; color: var(--text-main); border: 2px solid var(--border); box-shadow: none; border-radius: 18px; padding: 12px; font-size: 14px;
        }
        .nav-btn.active, .nav-btn:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--primary)); color: white; border-color: transparent;
        }

        .timer-menu-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 500px;
            margin: 0 auto;
        }
        .timer-menu-btn {
            padding: 18px;
            font-size: 16px;
            border-radius: 20px;
            background: #fffdfd;
            color: var(--text-main);
            border: 2px solid var(--border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.01);
            text-align: center;
        }

        /* 全画面表示 */
        .fullscreen-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-color); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .fullscreen-title { font-size: 22px; font-weight: bold; color: var(--primary-dark); margin-bottom: 15px; }
        .fullscreen-display { font-size: 72px; font-weight: bold; color: var(--text-main); margin-bottom: 10px; font-family: monospace; }
        .back-menu-btn { position: absolute; top: 15px; left: 15px; background: #fff; color: var(--text-main); border: 2px solid var(--border); box-shadow: none; padding: 8px 16px; font-size: 14px; }

        /* To doリスト */
        .todo-toggle-btn { margin-top: 15px; background: var(--text-sub); padding: 10px 20px; font-size: 14px; }
        .todo-overlay-container {
            display: none; margin-top: 15px; background: white; padding: 15px; border-radius: 20px; border: 2px solid var(--border); width: 100%; max-width: 320px; max-height: 180px; overflow-y: auto;
        }
        .todo-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .todo-item input[type="checkbox"] { width: auto; margin-bottom: 0; cursor: pointer; }
        .todo-item input[type="text"] { margin-bottom: 0; padding: 6px 12px; font-size: 13px; }

        /* カレンダー設定 */
        .calendar-section { background: #fffcfd; border: 2px solid var(--border); border-radius: 24px; padding: 15px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 15px; }
        .cal-cell {
            border: 2px solid var(--border); border-radius: 12px; padding: 6px; min-height: 80px; background: #fff; cursor: pointer; transition: background 0.2s; text-align: left;
        }
        .cal-cell:hover { background: #fff5fa; }
        .cal-cell.has-data { background: #fff0f6; border-color: var(--primary-light); }
        .cal-cell .date-num { font-size: 12px; font-weight: bold; color: var(--text-sub); }
        .cal-cell .study-time { font-size: 11px; color: var(--primary-dark); font-weight: bold; margin-top: 2px; display: block; }
        .cal-cell .global-event { font-size: 10px; background: var(--accent); color: white; padding: 1px 4px; border-radius: 4px; margin-top: 2px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 日記 */
        .diary-wrapper { width: 100%; max-width: 600px; background: #fff; padding: 15px; border-radius: 20px; border: 2px solid var(--border); }
        .diary-textarea {
            height: 260px; resize: none; font-size: 15px; line-height: 30px; padding: 0 5px; border: none; background: linear-gradient(to bottom, transparent 29px, var(--pencil-line) 29px); background-size: 100% 30px; attachment: local; border-radius: 0; margin-bottom: 10px;
        }

        /* チャット */
        .chat-container { width: 100%; max-width: 600px; height: 65%; display: flex; flex-direction: column; background: var(--chat-bg); border-radius: 24px; overflow: hidden; border: 2px solid var(--border); }
        .chat-messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; width: 100%; align-items: flex-end; }
        .msg-row.left { justify-content: flex-start; }
        .msg-row.right { justify-content: flex-end; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; }
        .msg-row.left .msg-wrapper { align-items: flex-start; }
        .msg-row.right .msg-wrapper { align-items: flex-end; }
        .msg-name { font-size: 11px; color: var(--text-sub); margin-bottom: 2px; padding-left: 4px; }
        .bubble-box { display: flex; align-items: flex-end; gap: 6px; }
        .chat-bubble { padding: 9px 13px; border-radius: 16px; font-size: 14px; word-break: break-all; line-height: 1.4; }
        .msg-row.left .chat-bubble { background: #ffffff; color: var(--text-main); border-top-left-radius: 4px; }
        .msg-row.right .chat-bubble { background: var(--primary-light); color: white; border-top-right-radius: 4px; }
        .msg-meta { font-size: 9px; color: var(--text-sub); display: flex; flex-direction: column; min-width: 30px; }
        .msg-row.right .msg-meta { text-align: right; }
        .chat-input-bar { display: flex; padding: 10px; background: #fff; gap: 8px; width: 100%; max-width: 600px; border-radius: 0 0 24px 24px; border: 2px solid var(--border); border-top: none; }
        .chat-input-bar input { margin-bottom: 0; padding: 10px; font-size: 14px; }
        .chat-input-bar button { padding: 10px 18px; font-size: 14px; }

        /* モーダル */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 10005; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: #fff; padding: 20px; border-radius: 24px; width: 100%; max-width: 360px; border: 3px solid var(--primary-light); }

        /* 管理者 */
        .admin-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 15px; margin-top: 15px; }
        .admin-menu-list { display: flex; flex-direction: column; gap: 8px; }
        .admin-view-area { background: #fffcfd; border: 2px solid var(--border); border-radius: 20px; padding: 15px; min-height: 350px; }
        .chat-manage-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid var(--border); font-size: 13px; gap: 5px; }

        /* 📱 スマートフォン（画面幅 600px 以下）用の調整レイアウト */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 20px 15px; border-radius: 24px; }
            
            /* 上部ダッシュボードを縦並びにしてスッキリ */
            .dashboard-top { grid-template-columns: 1fr; gap: 12px; }
            .dashboard-card { min-height: 100px; padding: 15px; }
            #live-clock { font-size: 28px; }

            /* ナビゲーションを2列×2行にして押しやすく */
            .nav-buttons { grid-template-columns: 1fr 1fr; gap: 8px; }
            .nav-btn { padding: 14px 10px; font-size: 14px; border-radius: 15px; }

            /* カレンダーが潰れないように高さをコンパクト化 */
            .calendar-section { padding: 10px; border-radius: 18px; }
            .calendar-grid { gap: 4px; }
            .cal-cell { min-height: 55px; padding: 4px; border-radius: 8px; }
            .cal-cell .date-num { font-size: 11px; }
            .cal-cell .study-time { font-size: 10px; margin-top: 1px; }
            .cal-cell .global-event { font-size: 8px; padding: 0px 2px; margin-top: 1px; }

            /* タイマー文字サイズをスマホサイズに */
            .fullscreen-display { font-size: 56px; }

            /* 管理者画面のレイアウトを縦並びに */
            .admin-grid { grid-template-columns: 1fr; }
            .admin-menu-list { flex-direction: row; flex-wrap: wrap; }
            .admin-menu-list button { flex: 1; padding: 10px; font-size: 13px; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="login-screen" class="container">
        <h2>Study Palette</h2>
        <input type="text" id="username" placeholder="ユーザーID">
        <input type="password" id="password" placeholder="パスワード">
        <button onclick="login()" style="width: 100%;">ログイン</button>
        <p id="login-error" style="color: red; font-size: 12px; margin-top: 10px; display: none; font-weight: bold;">IDまたはパスワードが違います</p>
    </div>

    <div id="main-screen" class="container">
        <div class="header">
            <div class="user-welcome"><span id="user-display-name">ユーザー</span> さんのページ</div>
            <button onclick="logout()" style="background:none; color:var(--text-sub); padding:0; box-shadow:none; font-size:13px;">ログアウト</button>
        </div>

        <div class="dashboard-top">
            <div class="dashboard-card">
                <div id="live-clock">00:00:00</div>
                <div id="live-date">2026年06月21日(日)</div>
            </div>
            <div class="dashboard-card clickable-card" onclick="switchSection('record')">
                <div style="font-size:13px; font-weight:bold; margin-bottom:3px; color:var(--primary-dark);">ミニカレンダー</div>
                <div id="mini-date-view" style="font-size:12px; color:var(--text-sub); text-align:center;"></div>
                <div style="font-size:10px; color:var(--text-sub); margin-top:5px;">タップして大きく開く</div>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" onclick="switchSection('timer')">勉強タイマー</button>
            <button class="nav-btn" onclick="switchSection('record')">勉強記録</button>
            <button class="nav-btn" onclick="switchSection('diary')">日記</button>
            <button class="nav-btn" onclick="switchSection('chat')">チャット</button>
        </div>

        <div id="section-timer" style="display:none;">
            <div class="timer-menu-list">
                <button class="timer-menu-btn" onclick="openFullscreen('clock')">時計</button>
                <button class="timer-menu-btn" onclick="openFullscreen('pomodoro')">ポモドーロタイマー</button>
                <button class="timer-menu-btn" onclick="openFullscreen('custom')">タイマー</button>
                <button class="timer-menu-btn" onclick="openFullscreen('stopwatch')">ストップウォッチ</button>
            </div>
        </div>

        <div id="section-record" style="display:none;" class="calendar-section">
            <h3>勉強記録・予定管理カレンダー</h3>
            <div class="calendar-grid" id="main-calendar-grid"></div>
        </div>
    </div>

    <div id="admin-screen" class="container">
        <div class="header">
            <div class="user-welcome">管理者画面</div>
            <button onclick="logout()" style="background:none; color:var(--text-sub); padding:0; box-shadow:none;">ログアウト</button>
        </div>
        <div class="admin-grid">
            <div class="admin-menu-list">
                <button onclick="switchAdminMenu('user-info')">ユーザ情報</button>
                <button onclick="switchAdminMenu('chat-manage')">チャット管理</button>
                <button onclick="switchAdminMenu('schedule-manage')">予定作成</button>
            </div>
            <div class="admin-view-area" id="admin-view-content"></div>
        </div>
    </div>


    <div id="timer-overlay" class="fullscreen-overlay">
        <button class="back-menu-btn" onclick="closeFullscreen()">もどる</button>
        <div class="fullscreen-title" id="overlay-title">タイマー</div>
        <div id="custom-setup-area" style="display:none; margin-bottom:15px;">
            <input type="number" id="custom-mins" value="15" style="width:90px; text-align:center; margin-bottom:0;" min="1"> 分
            <button onclick="setCustomTime()">セット</button>
        </div>
        <div class="fullscreen-display" id="overlay-display">00:00</div>
        <div id="pomo-status" style="display:none; margin-bottom:10px; font-weight:bold; color:var(--text-sub);"></div>
        
        <div id="timer-controls">
            <button id="timer-start-btn" onclick="toggleTimer()">スタート</button>
            <button onclick="resetTimer()">リセット</button>
            <button id="timer-save-btn" onclick="logTimerToRecord()" style="background:var(--accent); display:none;">記録する</button>
        </div>

        <button id="todo-toggle" class="todo-toggle-btn" onclick="toggleTodoDisplay()">To do</button>
        <div id="todo-box" class="todo-overlay-container">
            <div class="todo-item"><input type="checkbox" id="td-c1"><input type="text" id="td-t1" placeholder="タスク 1"></div>
            <div class="todo-item"><input type="checkbox" id="td-c2"><input type="text" id="td-t2" placeholder="タスク 2"></div>
            <div class="todo-item"><input type="checkbox" id="td-c3"><input type="text" id="td-t3" placeholder="タスク 3"></div>
        </div>
    </div>

    <div id="diary-overlay" class="fullscreen-overlay">
        <button class="back-menu-btn" onclick="closeFullscreen()">もどる</button>
        <div class="fullscreen-title">日記</div>
        <div style="margin-bottom:12px;">
            <input type="date" id="diary-date-select" onchange="loadDiary()" style="width:180px; margin-bottom:0; padding:8px 12px;">
        </div>
        <div class="diary-wrapper">
            <textarea id="diary-textarea" class="diary-textarea" placeholder="今日の日記を書きましょう" oninput="saveDiary()"></textarea>
        </div>
    </div>

    <div id="chat-overlay" class="fullscreen-overlay">
        <button class="back-menu-btn" onclick="closeFullscreen()">もどる</button>
        <div class="fullscreen-title">全体チャット</div>
        <div class="chat-container">
            <div class="chat-messages" id="chat-messages"></div>
        </div>
        <div class="chat-input-bar">
            <input type="text" id="chat-input" placeholder="メッセージを入力" onkeypress="if(event.key==='Enter') sendChat()">
            <button onclick="sendChat()">送信</button>
        </div>
    </div>


    <div id="record-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-date-title">00日</h3>
            <div style="margin-bottom:12px;">
                <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:4px;">勉強時間記録 (分)</label>
                <input type="number" id="modal-study-time" placeholder="時間 (分)" min="0">
            </div>
            <div style="margin-bottom:12px;">
                <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:4px;">共通の予定 (編集・削除可)</label>
                <input type="text" id="modal-schedule-text" placeholder="予定内容">
            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="saveCellRecord()" style="flex:1;">保存</button>
                <button onclick="deleteCellRecord()" style="background:var(--text-sub); flex:1;">データ削除</button>
            </div>
            <button onclick="closeModal()" style="background:none; color:var(--text-sub); width:100%; margin-top:12px; box-shadow:none;">閉じる</button>
        </div>
    </div>

    <script>
        const users = {
            "takuma": { pass: "1111", name: "柿原 拓真" },
            "yuzuki": { pass: "0925", name: "新里 結月" },
            "kanri2007": { pass: "kanri2007", name: "管理者", isAdmin: true }
        };

        let currentUser = null;
        let selectedDateNum = 1;

        function login() {
            const id = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            if (users[id] && users[id].pass === pass) {
                currentUser = users[id];
                currentUser.id = id;
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("login-error").style.display = "none";

                if (currentUser.isAdmin) {
                    document.getElementById("admin-screen").style.display = "block";
                    switchAdminMenu('user-info');
                } else {
                    document.getElementById("main-screen").style.display = "block";
                    document.getElementById("user-display-name").textContent = currentUser.name;
                    initDashboard();
                    switchSection('timer');
                }
            } else {
                document.getElementById("login-error").style.display = "block";
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById("login-screen").style.display = "block";
            document.getElementById("main-screen").style.display = "none";
            document.getElementById("admin-screen").style.display = "none";
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            closeFullscreen();
        }

        function initDashboard() {
            setInterval(() => {
                const now = new Date();
                document.getElementById("live-clock").textContent = now.toTimeString().split(' ')[0];
                document.getElementById("live-date").textContent = now.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
                if (currentMode === 'clock') {
                    document.getElementById("overlay-display").textContent = now.toTimeString().split(' ')[0];
                }
            }, 1000);

            const now = new Date();
            document.getElementById("mini-date-view").textContent = `${now.getFullYear()}年 ${now.getMonth()+1}月 ${now.getDate()}日`;
            renderCalendar();
        }

        function switchSection(sec) {
            document.getElementById("section-timer").style.display = sec === 'timer' ? 'block' : 'none';
            document.getElementById("section-record").style.display = sec === 'record' ? 'block' : 'none';
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => {
                if(btn.textContent.includes(sec === 'timer' ? 'タイマー' : sec === 'record' ? '記録' : sec === 'diary' ? '日記' : 'チャット')) {
                    btn.classList.add('active');
                }
            });

            if (sec === 'diary') {
                const todayStr = new Date().toISOString().split('T')[0];
                document.getElementById("diary-date-select").value = todayStr;
                loadDiary();
                document.getElementById("diary-overlay").style.display = "flex";
            } else if (sec === 'chat') {
                loadChat();
                document.getElementById("chat-overlay").style.display = "flex";
            }
        }

        let currentMode = '';
        function openFullscreen(mode) {
            currentMode = mode;
            const overlay = document.getElementById("timer-overlay");
            const title = document.getElementById("overlay-title");
            const display = document.getElementById("overlay-display");
            const setup = document.getElementById("custom-setup-area");
            const pomo = document.getElementById("pomo-status");
            const saveBtn = document.getElementById("timer-save-btn");
            const todoBtn = document.getElementById("todo-toggle");
            const todoBox = document.getElementById("todo-box");

            overlay.style.display = "flex";
            setup.style.display = "none";
            pomo.style.display = "none";
            saveBtn.style.display = "block";
            todoBtn.style.display = "block";
            todoBox.style.display = "none";
            document.getElementById("timer-controls").style.display = "block";
            
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById("timer-start-btn").textContent = "スタート";

            loadTodoItems();

            if (mode === 'clock') {
                title.textContent = "時計";
                document.getElementById("timer-controls").style.display = "none";
                saveBtn.style.display = "none";
                todoBtn.style.display = "none";
                display.textContent = new Date().toTimeString().split(' ')[0];
            } else if (mode === 'pomodoro') {
                title.textContent = "ポモドーロ";
                pomo.style.display = "block";
                pomo.textContent = "集中時間 (25分)";
                timerSeconds = 25 * 60;
                elapsedSeconds = 0;
                updateTimerDisplay();
            } else if (mode === 'custom') {
                title.textContent = "タイマー";
                setup.style.display = "block";
                timerSeconds = 15 * 60;
                elapsedSeconds = 0;
                updateTimerDisplay();
            } else if (mode === 'stopwatch') {
                title.textContent = "ストップウォッチ";
                timerSeconds = 0;
                elapsedSeconds = 0;
                display.textContent = "00:00.0";
            }
        }

        function closeFullscreen() {
            clearInterval(timerInterval);
            if(currentMode && currentMode !== 'clock') saveTodoItems();
            document.getElementById("timer-overlay").style.display = "none";
            document.getElementById("diary-overlay").style.display = "none";
            document.getElementById("chat-overlay").style.display = "none";
            currentMode = '';
        }

        function toggleTodoDisplay() {
            const box = document.getElementById("todo-box");
            box.style.display = box.style.display === "none" ? "block" : "none";
        }

        function saveTodoItems() {
            const todoData = {
                c1: document.getElementById("td-c1").checked, t1: document.getElementById("td-t1").value,
                c2: document.getElementById("td-c2").checked, t2: document.getElementById("td-t2").value,
                c3: document.getElementById("td-c3").checked, t3: document.getElementById("td-t3").value
            };
            localStorage.setItem(`todo_${currentUser.id}`, JSON.stringify(todoData));
        }

        function loadTodoItems() {
            const data = JSON.parse(localStorage.getItem(`todo_${currentUser.id}`) || '{"c1":false,"t1":"","c2":false,"t2":"","c3":false,"t3":""}');
            document.getElementById("td-c1").checked = data.c1; document.getElementById("td-t1").value = data.t1;
            document.getElementById("td-c2").checked = data.c2; document.getElementById("td-t2").value = data.t2;
            document.getElementById("td-c3").checked = data.c3; document.getElementById("td-t3").value = data.t3;
        }

        // タイマー
        let timerInterval = null;
        let timerSeconds = 0;
        let elapsedSeconds = 0;
        let isRunning = false;
        let isPomoBreak = false;

        function setCustomTime() {
            const m = document.getElementById("custom-mins").value;
            if (m > 0) {
                timerSeconds = m * 60;
                elapsedSeconds = 0;
                updateTimerDisplay();
            }
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
            const s = (timerSeconds % 60).toString().padStart(2, '0');
            document.getElementById("overlay-display").textContent = `${m}:${s}`;
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                document.getElementById("timer-start-btn").textContent = "スタート";
            } else {
                document.getElementById("timer-start-btn").textContent = "一時停止";
                timerInterval = setInterval(() => {
                    if (currentMode === 'stopwatch') {
                        timerSeconds++;
                        elapsedSeconds = Math.floor(timerSeconds / 10);
                        const totalSec = Math.floor(timerSeconds / 10);
                        const m = Math.floor(totalSec / 60).toString().padStart(2, '0');
                        const s = (totalSec % 60).toString().padStart(2, '0');
                        const ms = timerSeconds % 10;
                        document.getElementById("overlay-display").textContent = `${m}:${s}.${ms}`;
                    } else {
                        if (timerSeconds > 0) {
                            timerSeconds--;
                            elapsedSeconds++;
                            updateTimerDisplay();
                        } else {
                            clearInterval(timerInterval);
                            isRunning = false;
                            if (currentMode === 'pomodoro') {
                                if (!isPomoBreak) {
                                    alert("集中終了、5分休憩します！");
                                    isPomoBreak = true;
                                    document.getElementById("pomo-status").textContent = "休憩時間 (5分)";
                                    timerSeconds = 5 * 60;
                                    toggleTimer();
                                } else {
                                    alert("休憩終了、集中スタート！");
                                    isPomoBreak = false;
                                    document.getElementById("pomo-status").textContent = "集中時間 (25分)";
                                    timerSeconds = 25 * 60;
                                    updateTimerDisplay();
                                }
                            } else {
                                alert("終了しました！");
                            }
                        }
                    }
                }, currentMode === 'stopwatch' ? 100 : 1000);
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById("timer-start-btn").textContent = "スタート";
            if (currentMode === 'pomodoro') {
                isPomoBreak = false;
                document.getElementById("pomo-status").textContent = "集中時間 (25分)";
                timerSeconds = 25 * 60;
                updateTimerDisplay();
            } else if (currentMode === 'custom') {
                setCustomTime();
            } else if (currentMode === 'stopwatch') {
                timerSeconds = 0;
                document.getElementById("overlay-display").textContent = "00:00.0";
            }
            elapsedSeconds = 0;
        }

        function logTimerToRecord() {
            const mins = Math.max(1, Math.floor(elapsedSeconds / 60));
            const records = JSON.parse(localStorage.getItem(`study_records_${currentUser.id}`) || "{}");
            const today = new Date().getDate();
            records[today] = (records[today] ? parseInt(records[today]) : 0) + mins;
            localStorage.setItem(`study_records_${currentUser.id}`, JSON.stringify(records));
            alert(`${mins}分間を本日の日付に記録しました。`);
            resetTimer();
            renderCalendar();
        }

        // カレンダー
        function renderCalendar() {
            const grid = document.getElementById("main-calendar-grid");
            grid.innerHTML = "";
            const records = JSON.parse(localStorage.getItem(`study_records_${currentUser.id}`) || "{}");
            const schedules = JSON.parse(localStorage.getItem("global_schedules") || "{}");

            for (let i = 1; i <= 30; i++) {
                const time = records[i] ? `${records[i]}分` : "";
                const hasData = records[i] ? "has-data" : "";
                const schedule = schedules[i] ? `<span class="global-event">${schedules[i]}</span>` : "";

                grid.innerHTML += `
                    <div class="cal-cell ${hasData}" onclick="openCellModal(${i})">
                        <span class="date-num">${i}</span>
                        <span class="study-time">${time}</span>
                        ${schedule}
                    </div>
                `;
            }
        }

        function openCellModal(day) {
            selectedDateNum = day;
            document.getElementById("modal-date-title").textContent = `${day}日の編集・予定管理`;
            const records = JSON.parse(localStorage.getItem(`study_records_${currentUser.id}`) || "{}");
            const schedules = JSON.parse(localStorage.getItem("global_schedules") || "{}");
            
            document.getElementById("modal-study-time").value = records[day] || "";
            document.getElementById("modal-schedule-text").value = schedules[day] || "";
            document.getElementById("record-modal").style.display = "flex";
        }

        function closeModal() { document.getElementById("record-modal").style.display = "none"; }

        function saveCellRecord() {
            const val = document.getElementById("modal-study-time").value;
            const sched = document.getElementById("modal-schedule-text").value;
            
            const records = JSON.parse(localStorage.getItem(`study_records_${currentUser.id}`) || "{}");
            const schedules = JSON.parse(localStorage.getItem("global_schedules") || "{}");

            if (val > 0) records[selectedDateNum] = val;
            else delete records[selectedDateNum];

            if (sched.trim()) schedules[selectedDateNum] = sched;
            else delete schedules[selectedDateNum];

            localStorage.setItem(`study_records_${currentUser.id}`, JSON.stringify(records));
            localStorage.setItem("global_schedules", JSON.stringify(schedules));
            
            closeModal();
            renderCalendar();
        }

        function deleteCellRecord() {
            const records = JSON.parse(localStorage.getItem(`study_records_${currentUser.id}`) || "{}");
            const schedules = JSON.parse(localStorage.getItem("global_schedules") || "{}");
            
            delete records[selectedDateNum];
            delete schedules[selectedDateNum];
            
            localStorage.setItem(`study_records_${currentUser.id}`, JSON.stringify(records));
            localStorage.setItem("global_schedules", JSON.stringify(schedules));
            
            closeModal();
            renderCalendar();
        }

        // 日記
        function loadDiary() {
            const dateStr = document.getElementById("diary-date-select").value;
            if(!dateStr) return;
            const diaryData = JSON.parse(localStorage.getItem(`diary_${currentUser.id}`) || "{}");
            document.getElementById("diary-textarea").value = diaryData[dateStr] || "";
        }

        function saveDiary() {
            const dateStr = document.getElementById("diary-date-select").value;
            if(!dateStr) return;
            const diaryData = JSON.parse(localStorage.getItem(`diary_${currentUser.id}`) || "{}");
            diaryData[dateStr] = document.getElementById("diary-textarea").value;
            localStorage.setItem(`diary_${currentUser.id}`, JSON.stringify(diaryData));
        }

        // チャット
        function loadChat() {
            const box = document.getElementById("chat-messages");
            box.innerHTML = "";
            const logs = JSON.parse(localStorage.getItem("global_chat_logs") || "[]");

            logs.forEach(log => {
                const isMe = log.userId === currentUser.id;
                const side = isMe ? "right" : "left";
                
                let html = `<div class="msg-row ${side}"><div class="msg-wrapper">`;
                if(!isMe) html += `<div class="msg-name">${log.name}</div>`;
                html += `<div class="bubble-box">`;
                if(isMe) html += `<div class="msg-meta"><span>既読 1</span><span>${log.time}</span></div>`;
                html += `<div class="chat-bubble">${log.text}</div>`;
                if(!isMe) html += `<div class="msg-meta"><span style="margin-top:auto;">${log.time}</span></div>`;
                html += `</div></div></div>`;
                
                box.innerHTML += html;
            });
            box.scrollTop = box.scrollHeight;
        }

        function sendChat() {
            const input = document.getElementById("chat-input");
            if (!input.value.trim()) return;

            const logs = JSON.parse(localStorage.getItem("global_chat_logs") || "[]");
            const now = new Date();
            const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;

            logs.push({
                userId: currentUser.id,
                name: currentUser.name,
                text: input.value,
                time: timeStr
            });

            localStorage.setItem("global_chat_logs", JSON.stringify(logs));
            input.value = "";
            loadChat();
        }

        // 管理者
        function switchAdminMenu(menu) {
            const view = document.getElementById("admin-view-content");
            view.innerHTML = "";

            if (menu === 'user-info') {
                view.innerHTML = `
                    <h3>ユーザ情報閲覧 (日記対応)</h3>
                    <select id="admin-user-select" onchange="viewUserData()">
                        <option value="">選択してください</option>
                        <option value="takuma">柿原 拓真</option>
                        <option value="yuzuki">新里 結月</option>
                    </select>
                    <div id="admin-user-result" style="margin-top:15px; font-size:13px; white-space:pre-wrap; max-height:250px; overflow-y:auto; border:1px dashed var(--border); padding:10px; background:#fff;"></div>
                `;
            } else if (menu === 'chat-manage') {
                view.innerHTML = `
                    <h3>チャット管理</h3>
                    <input type="text" id="admin-announce-input" placeholder="全体への配信メッセージを入力">
                    <button onclick="sendAdminAnnounce()" style="margin-bottom:15px; width:100%;">配信する</button>
                    <div id="admin-chat-list"></div>
                `;
                renderAdminChatList();
            } else if (menu === 'schedule-manage') {
                view.innerHTML = `
                    <h3>予定作成 (全員共通)</h3>
                    <input type="number" id="admin-sched-day" placeholder="日付を選択 (1〜30)" min="1" max="30">
                    <input type="text" id="admin-sched-text" placeholder="予定内容を入力">
                    <button onclick="saveAdminSchedule()" style="width:100%;">予定を書き込む</button>
                    <div id="admin-sched-list" style="margin-top:20px; font-size:13px;"></div>
                `;
                renderAdminScheduleList();
            }
        }

        function viewUserData() {
            const uid = document.getElementById("admin-user-select").value;
            const res = document.getElementById("admin-user-result");
            if(!uid) { res.innerHTML = ""; return; }

            const records = JSON.parse(localStorage.getItem(`study_records_${uid}`) || "{}");
            const diary = JSON.parse(localStorage.getItem(`diary_${uid}`) || "{}");

            let text = `【勉強記録】\n`;
            for(let i=1; i<=30; i++) {
                if(records[i]) text += `${i}日: ${records[i]}分\n`;
            }

            text += `\n【日記内容】\n`;
            Object.keys(diary).forEach(date => {
                if(diary[date].trim()) text += `[日付: ${date}]\n${diary[date]}\n------------------\n`;
            });

            res.textContent = text;
        }

        function renderAdminChatList() {
            const list = document.getElementById("admin-chat-list");
            list.innerHTML = "<h4>メッセージ一覧 (クリックで削除)</h4>";
            const logs = JSON.parse(localStorage.getItem("global_chat_logs") || "[]");

            logs.forEach((log, index) => {
                list.innerHTML += `
                    <div class="chat-manage-item">
                        <span><strong>${log.name}</strong>: ${log.text}</span>
                        <button onclick="deleteChatByAdmin(${index})" style="padding:4px 8px; font-size:11px; background:var(--text-sub);">削除</button>
                    </div>
                `;
            });
        }

        function sendAdminAnnounce() {
            const input = document.getElementById("admin-announce-input");
            if(!input.value.trim()) return;

            const logs = JSON.parse(localStorage.getItem("global_chat_logs") || "[]");
            const now = new Date();
            logs.push({
                userId: "admin",
                name: "管理者アナウンス",
                text: input.value,
                time: `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`
            });
            localStorage.setItem("global_chat_logs", JSON.stringify(logs));
            input.value = "";
            renderAdminChatList();
        }

        function deleteChatByAdmin(index) {
            const logs = JSON.parse(localStorage.getItem("global_chat_logs") || "[]");
            logs.splice(index, 1);
            localStorage.setItem("global_chat_logs", JSON.stringify(logs));
            renderAdminChatList();
        }

        function renderAdminScheduleList() {
            const list = document.getElementById("admin-sched-list");
            list.innerHTML = "<h4>現在の共通予定</h4>";
            const schedules = JSON.parse(localStorage.getItem("global_schedules") || "{}");

            for(let i=1; i<=30; i++) {
                if(schedules[i]) {
                    list.innerHTML += `<div style="margin-bottom:5px;">${i}日: ${schedules[i]}</div>`;
                }
            }
        }

        function saveAdminSchedule() {
            const day = document.getElementById("admin-sched-day").value;
            const text = document.getElementById("admin-sched-text").value;
            if(!day || day < 1 || day > 30) { alert("正しい日付(1〜30)を入力してください"); return; }

            const schedules = JSON.parse(localStorage.getItem("global_schedules") || "{}");
            if(text.trim()) schedules[day] = text;
            else delete schedules[day];

            localStorage.setItem("global_schedules", JSON.stringify(schedules));
            document.getElementById("admin-sched-day").value = "";
            document.getElementById("admin-sched-text").value = "";
            renderAdminScheduleList();
        }
    </script>
</body>
</html>
